name: CI - EstudioContableApp

on:
  push:
    branches:
      - develop
      - feature/github-actions
      - feature/github-actions-mejorado

  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: windows-latest
    
    strategy: 
      matrix: 
       configuration: [Debug, Release]

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet 
        uses: actions/cache@v4 
        with: 
         path: ~/.nuget/packages 
         key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }} 
         restore-keys: | 
              ${{ runner.os }}-nuget-

      - name: Restaurar dependencias
        run: dotnet restore EstudioContableApp.slnx

      - name: Compilar solucion
        run: dotnet build EstudioContableApp.slnx --configuration Debug --no-restore

      - name: Ejecutar pruebas
        run: dotnet test EstudioContableApp.slnx --configuration Debug --no-build

      - name: Publicar resultados 
        uses: actions/upload-artifact@v4 
        with: 
              name: build-${{ matrix.configuration }} 
              path: .